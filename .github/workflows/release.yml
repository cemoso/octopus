name: Release Docker image to GHCR

# On every `v*` tag, build the apps/web Docker image and push it to GitHub
# Container Registry with both a semver tag and the `latest` alias. The
# self-hosted update page (apps/web/app/(app)/settings/updates) reads
# `latestRelease` from SystemConfig — a daily pg-boss job refreshes that
# cache by fetching the latest release here.
#
# Maintainers cut a release by:
#   1. Bump apps/web/package.json version
#   2. git tag v0.X.Y && git push origin v0.X.Y
#   3. This workflow builds, pushes, and creates a GitHub Release with
#      auto-generated notes.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to full commit SHAs — supply-chain
      # mitigation for workflows with contents:write that publish images
      # users pull. Trailing comment records the tag at pin time. To
      # bump: `gh api repos/<owner>/<repo>/git/refs/tags/<tag> --jq .object.sha`.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          # Strip the leading "v" from the tag — e.g. v0.2.0 → 0.2.0
          REF_NAME=${GITHUB_REF#refs/tags/}
          SEMVER=${REF_NAME#v}
          echo "semver=$SEMVER" >> $GITHUB_OUTPUT
          echo "image_name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build + push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: apps/web/Dockerfile
          # ARM64 build is slow and the primary deployment target is x86_64;
          # add linux/arm64 to platforms when there's demand.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.image_name }}:${{ steps.tags.outputs.semver }}
            ${{ steps.tags.outputs.image_name }}:latest
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.tags.outputs.semver }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          generate_release_notes: true
          name: ${{ steps.tags.outputs.semver }}
          body: |
            Docker image: `ghcr.io/${{ github.repository }}:${{ steps.tags.outputs.semver }}`

            To upgrade a self-hosted instance:

            ```bash
            docker compose pull
            docker compose up -d
            docker compose exec web npx prisma migrate deploy --schema packages/db/prisma/schema.prisma
            ```

            See the [Updates page](https://docs.octopus-review.ai) in your self-hosted UI for a one-click upgrade path.
